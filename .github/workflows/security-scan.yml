name: security-scan

on:
  push:
    branches:
      - main
      - "refactor/**"
  pull_request:
    branches:
      - main
  schedule:
    # Weekly Monday 03:00 UTC catches new CVEs even when no
    # changes land.
    - cron: "0 3 * * 1"

permissions:
  contents: read
  security-events: write

jobs:
  # ── Find committed secrets ─────────────────────────────────
  gitleaks:
    name: gitleaks (secret scan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Go vulnerability scan ──────────────────────────────────
  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - run: govulncheck ./...

  # ── Node dependency advisories ─────────────────────────────
  npm-audit:
    name: npm audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci --no-audit --no-fund
      # Only fail on high+ severity so noisy transitive moderate
      # CVEs in build tooling don't block PRs; weekly schedule
      # still surfaces them.
      - run: npm audit --audit-level=high --omit=dev

  # ── Static analysis ────────────────────────────────────────
  semgrep:
    name: semgrep
    runs-on: ubuntu-latest
    container:
      image: returntocorp/semgrep:latest
    steps:
      - uses: actions/checkout@v4
      - run: semgrep ci
        env:
          SEMGREP_RULES: >-
            p/default
            p/golang
            p/javascript
            p/typescript
            p/react
            p/owasp-top-ten
            p/secrets
