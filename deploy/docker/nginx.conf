server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Hashed asset files cache aggressively (Vite produces
    # content-hashed filenames so a 1-year max-age is safe).
    location /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # SPA fallback: anything that doesn't match a real file goes
    # to index.html so React Router can render the route.
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    # Health endpoint for k8s probes.
    location = /healthz {
        return 200 'ok';
        add_header Content-Type text/plain;
    }

    # Security headers (CSP gets stricter in Phase F once we
    # finalise the API base URL and CDN host).
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;
    add_header Referrer-Policy strict-origin-when-cross-origin;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json application/xml image/svg+xml;
    gzip_min_length 1024;
}
