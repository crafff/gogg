# Pre-commit and commit-msg hooks managed by lefthook.
# Install once per clone with:  make hooks   (== `lefthook install`)
#
# Each hook runs only on the files actually staged for the commit
# (lefthook's {staged_files} substitution). Failures block the
# commit; emergency override is `git commit --no-verify` and
# must be justified in review.

pre-commit:
  parallel: true
  commands:
    # ── Go ────────────────────────────────────────────────────
    gofmt:
      glob: "*.go"
      run: gofmt -l -s {staged_files} | tee /dev/stderr | (! grep .)
      stage_fixed: false

    govet:
      glob: "*.go"
      # Vet at package granularity, not file. Pull the package
      # set from the changed files.
      run: |
        pkgs=$(echo {staged_files} | tr ' ' '\n' | xargs -n1 dirname | sort -u | sed 's|^|./|')
        [ -z "$pkgs" ] || go vet $pkgs

    golangci-lint:
      glob: "*.go"
      # golangci-lint needs whole packages to type-check, not loose
      # files. Reduce staged files to their unique package dirs.
      run: |
        pkgs=$(echo {staged_files} | tr ' ' '\n' | xargs -n1 dirname | sort -u | sed 's|^|./|')
        [ -z "$pkgs" ] || golangci-lint run --fast $pkgs

    # ── Web ───────────────────────────────────────────────────
    prettier:
      glob: "{apps/web,web}/**/*.{ts,tsx,js,jsx,json,css,md}"
      # cd into the web package so prettier picks up its local config,
      # but {staged_files} is repo-relative — strip the base prefix
      # before handing the paths to prettier.
      run: |
        base=$(echo {staged_files} | awk '{print $1}' | grep -oE '^(apps/web|web)' | head -1)
        rel=$(echo {staged_files} | tr ' ' '\n' | sed "s|^${base}/||" | tr '\n' ' ')
        cd ${base} && npx prettier --check $rel

    eslint:
      glob: "{apps/web,web}/**/*.{ts,tsx,js,jsx}"
      # --no-warn-ignored silences the v9 warning that fires when an
      # explicitly-passed file matches the ignore list (e.g. codegen
      # output under src/**/generated/**). The file is still skipped,
      # just without --max-warnings=0 tripping over the notice.
      run: |
        base=$(echo {staged_files} | awk '{print $1}' | grep -oE '^(apps/web|web)' | head -1)
        rel=$(echo {staged_files} | tr ' ' '\n' | sed "s|^${base}/||" | tr '\n' ' ')
        cd ${base} && npx eslint --max-warnings 0 --no-warn-ignored $rel

    # ── Security ──────────────────────────────────────────────
    # Skip gracefully if gitleaks isn't installed locally; the CI
    # security-scan workflow always runs it server-side, so a
    # missing local install doesn't get secrets through.
    gitleaks:
      run: |
        if command -v gitleaks >/dev/null 2>&1; then
          gitleaks protect --staged --redact --no-banner
        else
          echo "gitleaks not installed locally (CI still runs it); skipping"
        fi

    # ── Generic ───────────────────────────────────────────────
    no-trailing-whitespace:
      glob: "*.{go,ts,tsx,js,jsx,yaml,yml,md,sql,Dockerfile,sh}"
      # Skip codegen output — graphql-codegen / sqlc / gqlgen emit
      # trailing whitespace inside template gaps, and re-running codegen
      # would re-introduce it. Hand-written code still gets the check.
      run: |
        files=$(echo {staged_files} | tr ' ' '\n' | grep -vE '(^|/)(generated/|gen/)' | tr '\n' ' ')
        [ -z "$files" ] && exit 0
        if grep -nE ' +$' $files; then
          echo "trailing whitespace; run 'make fmt'"
          exit 1
        fi

# ── Commit message ──────────────────────────────────────────
# commitlint runs against a Conventional Commits ruleset, but it
# resolves @commitlint/config-conventional from the repo root,
# which means it needs a package.json at / installing it as a
# dev dep. That package.json arrives with the new apps/web/ in
# Phase D; reintroduce the hook then. Until then commit message
# discipline is enforced by code review, not tooling.

# ── Skip rules ──────────────────────────────────────────────
# Skip everything when the commit is a merge or revert.
skip_output:
  - meta
  - success
