version: "2"

# sqlc generates type-safe Go from the SQL files in queries/, using
# the schema reconstructed from migrations/. Run via:
#   make gen-sqlc
#
# Generated code lands in gen/ and is committed (treat it like
# protoc output — read-only, regenerate on schema/query change).

sql:
  - engine: postgresql
    schema: migrations
    queries: queries
    gen:
      go:
        package: sqlcgen
        out: gen
        sql_package: pgx/v5
        emit_interface: true
        emit_json_tags: false
        emit_db_tags: false
        emit_prepared_queries: false
        emit_exact_table_names: false
        emit_empty_slices: true
        emit_pointers_for_null_types: true
        omit_unused_structs: true
        query_parameter_limit: 3
