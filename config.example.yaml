# Global API key used by all regions unless overridden per-region.
riot:
  api_key: "YOUR_API_KEY"

# Single-region setup (backward compatible — region defaults to "KR"):
#   riot:
#     api_key: "YOUR_API_KEY"
#     base_url: "https://kr.api.riotgames.com"
#
# Multi-region setup: define each region explicitly.
regions:
  - name: KR
    base_url: "https://kr.api.riotgames.com"
  - name: NA1
    base_url: "https://na1.api.riotgames.com"
    # api_key: "DIFFERENT_KEY"   # optional per-region override

database:
  dsn: "postgres://gogg:goggpass@localhost:55433/gogg?sslmode=disable"
  max_open_conns: 10
  max_idle_conns: 2
  conn_max_lifetime_seconds: 300

run_profiles:

  daily_kr:
    region: KR
    mode: incremental
    target_tiers:
      - CHALLENGER
      - GRANDMASTER
      - MASTER
    rank_prefetch_tiers:
      - CHALLENGER
      - GRANDMASTER
      - MASTER
      - DIAMOND
    queue: RANKED_SOLO_5x5
    execution: pipeline

  daily_na:
    region: NA1
    mode: incremental
    target_tiers:
      - CHALLENGER
      - GRANDMASTER
      - MASTER
    rank_prefetch_tiers:
      - CHALLENGER
      - GRANDMASTER
      - MASTER
      - DIAMOND
    queue: RANKED_SOLO_5x5
    execution: pipeline

  diamond_weekly_kr:
    region: KR
    mode: incremental
    target_tiers:
      - CHALLENGER
      - GRANDMASTER
      - MASTER
      - DIAMOND
    rank_prefetch_tiers:
      - CHALLENGER
      - GRANDMASTER
      - MASTER
      - DIAMOND
      - EMERALD
    queue: RANKED_SOLO_5x5
    execution: pipeline

  patch_historical_kr:
    region: KR
    mode: historical
    version: "14.10"
    target_tiers:
      - CHALLENGER
      - GRANDMASTER
    rank_prefetch_tiers:
      - CHALLENGER
      - GRANDMASTER
      - MASTER
    queue: RANKED_SOLO_5x5
    execution: sequential

schedule:
  - cron: "0 4 * * *"       # daily at 04:00 — KR and NA run in parallel
    profile: daily_kr
  - cron: "0 4 * * *"
    profile: daily_na
  - cron: "0 3 * * 1"       # every Monday at 03:00
    profile: diamond_weekly_kr
