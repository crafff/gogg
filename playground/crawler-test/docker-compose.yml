services:
  postgres:
    image: postgres:16
    container_name: gogg-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: gogg
      POSTGRES_PASSWORD: goggpass
      POSTGRES_DB: gogg
    ports:
      - "55433:5432"
    volumes:
      - gogg_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gogg -d gogg"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  gogg_postgres_data:
