# SOPS recipient configuration.
#
# Each rule says: "for files matching this pattern, encrypt to
# these age public keys". A leaked dev key must not decrypt prod.
#
# Add your age public key (output of `age-keygen`) below; until
# then sops will refuse to encrypt and the scaffold stays inert.

creation_rules:
  - path_regex: deploy/secrets/dev\.enc\.yaml$
    age: >-
      age1uu94t94nwza8jen4prn428m6p42qx2tn5fl805xagsfl2a07z97s8zcezw

  - path_regex: deploy/secrets/staging\.enc\.yaml$
    age: >-
      age1uu94t94nwza8jen4prn428m6p42qx2tn5fl805xagsfl2a07z97s8zcezw

  - path_regex: deploy/secrets/prod\.enc\.yaml$
    age: >-
      age1uu94t94nwza8jen4prn428m6p42qx2tn5fl805xagsfl2a07z97s8zcezw
