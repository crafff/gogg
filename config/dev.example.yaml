# Local development config shared by gogg-api and gogg-worker.
# Copy to config/dev.yaml for plaintext local use, or mirror this
# structure in deploy/secrets/dev.enc.yaml for SOPS-managed secrets.

api:
  port: 8080
  read_timeout: 10s
  write_timeout: 15s
  idle_timeout: 60s
  shutdown_grace: 15s
  allowed_origins:
    - http://localhost:5173
    - http://localhost:3000
  graphql_playground: true

temporal:
  host_port: localhost:7233
  namespace: default
  task_queues:
    - crawl-kr
    - crawl-na1

database:
  dsn: postgres://gogg:goggpass@localhost:55433/gogg?sslmode=disable
  max_open_conns: 10
  min_idle_conns: 2
  max_idle_conns: 2
  conn_max_lifetime: 5m
  conn_max_lifetime_seconds: 300

redis:
  url: redis://localhost:6379/0

logging:
  level: info
  format: json

auth:
  jwt_secret: change-me-in-dev
  issuer: gogg.local
  access_ttl: 15m
  refresh_ttl: 720h
  cookie_domain: ""
  cookie_secure: false

oauth:
  discord:
    client_id: ""
    client_secret: ""
    redirect_url: ""
  google:
    client_id: ""
    client_secret: ""
    redirect_url: ""

riot:
  api_key: YOUR_API_KEY
  base_url: https://kr.api.riotgames.com

regions:
  - name: KR
    base_url: https://kr.api.riotgames.com
  - name: NA1
    base_url: https://na1.api.riotgames.com

run_profiles:
  daily_kr:
    region: KR
    mode: incremental
    target_tiers: [CHALLENGER, GRANDMASTER, MASTER]
    rank_prefetch_tiers: [CHALLENGER, GRANDMASTER, MASTER, DIAMOND]
    queue: RANKED_SOLO_5x5
    execution: pipeline

  daily_na:
    region: NA1
    mode: incremental
    target_tiers: [CHALLENGER, GRANDMASTER, MASTER]
    rank_prefetch_tiers: [CHALLENGER, GRANDMASTER, MASTER, DIAMOND]
    queue: RANKED_SOLO_5x5
    execution: pipeline

  diamond_weekly_kr:
    region: KR
    mode: incremental
    target_tiers: [CHALLENGER, GRANDMASTER, MASTER, DIAMOND]
    rank_prefetch_tiers: [CHALLENGER, GRANDMASTER, MASTER, DIAMOND, EMERALD]
    queue: RANKED_SOLO_5x5
    execution: pipeline

schedule:
  - cron: "0 4 * * *"
    profile: daily_kr
  - cron: "0 4 * * *"
    profile: daily_na
  - cron: "0 3 * * 1"
    profile: diamond_weekly_kr
